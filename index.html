<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1e3366">
  <title>CPM — Historia Clínica</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- HEADER -->
  <div class="header">
    <svg class="logo-dots" viewBox="0 0 38 38" fill="none">
      <circle cx="19" cy="4" r="2.5" fill="rgba(255,255,255,0.3)" />
      <circle cx="26" cy="6" r="2.5" fill="rgba(255,255,255,0.4)" />
      <circle cx="32" cy="11" r="2.5" fill="rgba(255,255,255,0.5)" />
      <circle cx="34" cy="19" r="2.5" fill="rgba(255,255,255,0.6)" />
      <circle cx="32" cy="27" r="2.5" fill="rgba(255,255,255,0.5)" />
      <circle cx="26" cy="32" r="2.5" fill="rgba(255,255,255,0.4)" />
      <circle cx="19" cy="34" r="2.5" fill="rgba(255,255,255,0.3)" />
      <circle cx="12" cy="32" r="2.5" fill="rgba(255,255,255,0.4)" />
      <circle cx="6" cy="27" r="2.5" fill="rgba(255,255,255,0.5)" />
      <circle cx="4" cy="19" r="2.5" fill="rgba(255,255,255,0.6)" />
      <circle cx="6" cy="11" r="2.5" fill="rgba(255,255,255,0.5)" />
      <circle cx="12" cy="6" r="2.5" fill="rgba(255,255,255,0.4)" />
      <rect x="14" y="14" width="5" height="5" rx="1" fill="#22c55e" />
      <rect x="20" y="14" width="5" height="5" rx="1" fill="#22c55e" />
      <rect x="14" y="20" width="5" height="5" rx="1" fill="#22c55e" />
      <rect x="20" y="20" width="5" height="5" rx="1" fill="rgba(34,197,94,0.4)" />
    </svg>
    <div class="header-text">
      <h1>CPM Historia Clínica</h1>
      <p>Clínica Privada Modelo · Río Tercero</p>
    </div>
    <img src="logo-cpm.png" alt="CPM" style="height:70px; margin-left:auto; mix-blend-mode:screen; opacity:0.95;">
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- MÉDICO -->
    <div class="card">
      <div class="card-title">Médico</div>
      <div id="medico-saved" class="medico-saved" style="display:none">
        <div class="medico-info">
          <h3 id="medico-nombre-display">—</h3>
          <p id="medico-especialidad-display">—</p>
        </div>
        <button class="btn-cambiar" onclick="abrirModalMedico()">Cambiar</button>
      </div>
      <div id="medico-vacio" style="display:none">
        <button class="btn-adjuntar" onclick="abrirModalMedico()">
          <span>👤</span> Configurar médico
        </button>
      </div>
    </div>

    <!-- PACIENTE -->
    <div class="card">
      <div class="card-title">Paciente</div>
      <div class="field-group">
        <div class="field">
          <label>Nombre completo</label>
          <input type="text" id="paciente-nombre" placeholder="Ej: García Juan Carlos">
        </div>
        <div class="field-row">
          <div class="field">
            <label>DNI</label>
            <input type="text" id="paciente-dni" placeholder="Ej: 32456789">
          </div>
          <div class="field">
            <label>Fecha</label>
            <div class="fecha-display">
              <span class="fecha-icon">📅</span>
              <span id="fecha-auto">—</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- EVOLUCIÓN / DICTADO -->
    <div class="card">
      <div class="card-title">Evolución</div>
      <div class="grabador">
        <div class="wave-container" id="wave-container">
          <div class="wave-status">
            <div class="wave-dot"></div>
            <span>Grabando</span>
          </div>
        </div>
        <button class="btn-grabar idle" id="btn-grabar" onclick="toggleGrabacion()">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M12 15c1.66 0 3-1.34 3-3V6c0-1.66-1.34-3-3-3S9 4.34 9 6v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V6zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-2.08c3.39-.49 6-3.39 6-6.92h-2z" />
          </svg>
          <span id="btn-grabar-texto">Iniciar dictado</span>
        </button>
        <div class="evolucion-area">
          <textarea id="evolucion"
            placeholder="El texto transcripto aparecerá aquí. También podés escribir directamente..."></textarea>
          <div class="char-count"><span id="char-count">0</span> caracteres</div>
        </div>
      </div>
    </div>

    <!-- ADJUNTOS -->
    <div class="card">
      <div class="card-title">Adjuntos</div>
      <div class="adjuntos-grid" id="adjuntos-grid"></div>
      <button class="btn-adjuntar" onclick="document.getElementById('file-input').click()">
        <span>📎</span> Adjuntar foto o PDF
      </button>
      <input type="file" id="file-input" accept="image/*,.pdf" multiple onchange="agregarAdjuntos(this)">
    </div>

    <!-- ENVIAR -->
    <button class="btn-enviar" id="btn-enviar" onclick="enviar()">
      Enviar historia clínica
    </button>

  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <!-- MODAL MÉDICO -->
  <div class="modal-overlay" id="modal-overlay" onclick="cerrarModalSiFuera(event)">
    <div class="modal">
      <h2>Configurar médico</h2>
      <div class="modal-fields">
        <div class="field">
          <label>Nombre y apellido</label>
          <input type="text" id="modal-nombre" placeholder="Ej: Torres Cecilia">
        </div>
        <div class="field">
          <label>Especialidad</label>
          <input type="text" id="modal-especialidad" placeholder="Ej: Clínica Médica, Urología...">
        </div>
      </div>
      <button class="btn-guardar-medico" onclick="guardarMedico()">Guardar</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
